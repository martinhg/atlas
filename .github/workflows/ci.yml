name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out
        env:
          DATABASE_URL: postgres://atlas:atlas@localhost:5432/atlas_test?sslmode=disable

      - name: Check coverage
        run: |
          head -1 coverage.out > coverage-internal.out
          grep "^github.com/nesbite/atlas/internal/" coverage.out >> coverage-internal.out
          total=$(go tool cover -func=coverage-internal.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage (internal/): ${total}%"
          threshold=55
          if [ "$(echo "$total < $threshold" | bc -l)" -eq 1 ]; then
            echo "FAIL: Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Verify registry source
        run: |
          if grep -v "registry.npmjs.org" pnpm-lock.yaml | grep -qE "https?://[^/]+/" 2>/dev/null; then
            echo "ERROR: Dependencies from non-approved registries detected"
            exit 1
          fi
          echo "All dependencies from approved registry"

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  pr-checks:
    name: PR Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            test
            refactor
            ci
            perf
            build
            style
          requireScope: false
